        let player;

        // চ্যানেল লোগো বা ক্যাটাগরি অনুসারে মানানসই ব্যাকগ্রাউন্ড ও টেক্সট আইকন জেনারেট করার ফাংশন
        function getChannelLogoStyles(name) {
            const hash = name.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
            const gradients = [
                'from-blue-600 to-indigo-600',
                'from-emerald-500 to-teal-600',
                'from-rose-500 to-orange-600',
                'from-purple-600 to-pink-600',
                'from-amber-500 to-red-600'
            ];
            const selectedGradient = gradients[hash % gradients.length];
            const initials = name.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
            return {
                gradient: selectedGradient,
                text: initials.slice(0, 2)
            };
        }

        // চ্যানেলের নাম অনুসারে স্বয়ংক্রিয় ক্যাটাগরি নির্ধারণ
        function getChannelCategory(channel) {
            const name = channel.name.toLowerCase();
            if (name.includes('sport') || name.includes('bein') || name.includes('willow') || name.includes('aspor') || name.includes('sports')) return 'sports';
            if (name.includes('news') || name.includes('somoy') || name.includes('ekattor') || name.includes('independent') || name.includes('jamuna') || name.includes('ekhbaria') || name.includes('dw') || name.includes('france 24') || name.includes('cnn') || name.includes('ndtv') || name.includes('rt news') || name.includes('press tv') || name.includes('kolkata tv')) return 'news';
            if (name.includes('quran') || name.includes('sunnah') || name.includes('madani') || name.includes('waz') || name.includes('alqamar') || name.includes('istiqama')) return 'islamic';
            if (name.includes('kids') || name.includes('cartoon') || name.includes('cbeebies') || name.includes('doraemon') || name.includes('gopal') || name.includes('motu') || name.includes('junior') || name.includes('smart')) return 'kids';
            return 'entertainment'; 
        }

        // পেইজ লোড হওয়ার সাথে সাথে প্লেয়ার এবং ফিচারসমূহ ইনিশিয়ালাইজেশন
        window.onload = function() {
            document.getElementById('total-channels-badge').textContent = `${dataSet.channels.length}টি চ্যানেল`;

            // Video.js ইনিশিয়ালাইজেশন
            player = videojs('my-video', {
                fluid: true,
                responsive: true,
                playbackRates: [0.5, 1, 1.25, 1.5, 2],
                userActive: true,
                controlBar: { skipButtons: { forward: 10, backward: 10 } }
            });

            // ভিডিও কোয়ালিটি কন্ট্রোল সিলেক্টর প্লাগইন ইনিশিয়ালাইজেশন
            player.hlsQualitySelector({ displayCurrentQuality: true });

            // এরর ম্যানেজমেন্ট
            player.on('error', function() {
                const errorDisplay = document.querySelector('.vjs-error-display');
                if (errorDisplay) {
                    errorDisplay.innerHTML = `
                        <div class="p-6 text-center">
                            <i class="fa-solid fa-triangle-exclamation text-yellow-500 text-2xl mb-2"></i>
                            <p class="font-bold text-white text-sm">চ্যানেলটি লোড হতে সমস্যা হচ্ছে</p>
                            <p class="text-xs text-slate-400 mt-2">দয়া করে অন্য কোনো চ্যানেল ট্রাই করুন বা কিছুক্ষণ পর আবার চেষ্টা করুন।</p>
                        </div>
                    `;
                }
            });

            // সার্চ ইনপুট ইভেন্ট লিসেনার
            document.getElementById('search-input').addEventListener('input', function(e) {
                searchQuery = e.target.value.toLowerCase().trim();
                renderChannels();
            });

            // ক্যাটাগরি বাটন লিসেনারসমূহ
            const pills = document.querySelectorAll('.category-pill');
            pills.forEach(pill => {
                pill.addEventListener('click', function() {
                    pills.forEach(p => {
                        p.classList.remove('bg-blue-600', 'text-white', 'shadow-md', 'shadow-blue-500/10');
                        p.classList.add('bg-slate-800', 'text-slate-400');
                    });
                    this.classList.add('bg-blue-600', 'text-white', 'shadow-md', 'shadow-blue-500/10');
                    this.classList.remove('bg-slate-800', 'text-slate-400');
                    
                    activeCategory = this.getAttribute('data-category');
                    renderChannels();
                });
            });

            // চ্যানেল রেন্ডারিং এবং প্রথম চ্যানেল প্লে করা
            renderChannels();
            if (dataSet.channels.length > 0) {
                playChannel(dataSet.channels[0].url);
            }
        };

        // চ্যানেল লিস্ট রেন্ডার করার ফাংশন
        function renderChannels() {
            const container = document.getElementById('channels-container');
            container.innerHTML = '';

            let filtered = dataSet.channels.filter(ch => {
                if (!ch.name) return false;
                const matchesSearch = ch.name.toLowerCase().includes(searchQuery);
                const chCat = getChannelCategory(ch);
                const matchesCategory = (activeCategory === 'all' || chCat === activeCategory);
                return matchesSearch && matchesCategory;
            });

            document.getElementById('showing-count').textContent = `${filtered.length}টি`;

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="p-10 text-center text-slate-500 text-xs">
                        <i class="fa-solid fa-folder-open text-3xl mb-2 text-slate-600"></i><br>
                        কোনো চ্যানেল খুঁজে পাওয়া যায়নি!
                    </div>
                `;
                return;
            }

            filtered.forEach(ch => {
                const isActive = (ch.url === currentActiveUrl);
                const logoInfo = getChannelLogoStyles(ch.name);
                const isMp4 = ch.url.endsWith('.mp4') || ch.url.endsWith('.mkv');
                
                const card = document.createElement('div');
                card.className = `p-3 rounded-xl flex items-center justify-between cursor-pointer transition-all duration-300 group ${
                    isActive 
                    ? 'bg-blue-600/20 border border-blue-500/50' 
                    : 'bg-slate-900 border border-slate-800 hover:bg-slate-800/80 hover:border-slate-700'
                }`;
                
                card.innerHTML = `
                    <div class="flex items-center gap-3.5 min-w-0 flex-grow" onclick="playChannel('${ch.url}')">
                        <!-- ডায়নামিক লোগো মেকার -->
                        <div class="w-10 h-10 rounded-xl flex-shrink-0 flex items-center justify-center font-black text-xs text-white shadow-md bg-gradient-to-tr ${logoInfo.gradient}">
                            ${logoInfo.text}
                        </div>
                        <div class="min-w-0">
                            <h4 class="text-sm font-bold truncate ${isActive ? 'text-blue-400' : 'text-slate-200 group-hover:text-white'}">${ch.name}</h4>
                            <p class="text-[10px] font-medium text-slate-500 truncate mt-1 flex items-center gap-1">
                                ${isMp4 ? '<i class="fa-solid fa-clapperboard text-indigo-400"></i> ভিডিও ফাইল' : '<i class="fa-solid fa-tower-broadcast text-emerald-400"></i> লাইভ স্ট্রিম'}
                            </p>
                        </div>
                    </div>
                    <div class="flex items-center gap-1">
                        ${isActive ? '<span class="w-2.5 h-2.5 bg-blue-500 rounded-full animate-pulse mr-2 shadow-[0_0_8px_rgba(59,130,246,0.8)]"></span>' : '<i class="fa-solid fa-play text-slate-600 text-[10px] group-hover:text-blue-400 mr-2 transition-colors"></i>'}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // চ্যানেল প্লে করার ফাংশন
        function playChannel(url) {
            currentActiveUrl = url;
            
            // লিস্টের একটিভ স্টেট চেঞ্জ করার জন্য পুনরায় রেন্ডার
            renderChannels();

            // ভিডিও ফরম্যাট ডিটেক্ট করা
            let streamType = 'application/x-mpegURL'; // m3u8 স্ট্রিম
            if (url.endsWith('.mp4')) {
                streamType = 'video/mp4';
            } else if (url.endsWith('.mkv')) {
                streamType = 'video/webm';
            } else if (url.endsWith('.mp3')) {
                streamType = 'audio/mpeg';
            }

            try {
                player.src({
                    src: url,
                    type: streamType
                });
                player.play();
                
                // (অটো-স্ক্রল ফিচারটি অফ করে দেওয়া হয়েছে)
                // window.scrollTo({ top: 0, behavior: 'smooth' }); 
                
            } catch (error) {
                console.error("ভিডিও স্ট্রিম লোড করতে ব্যর্থ হয়েছে:", error);
            }
        }
    </script>
