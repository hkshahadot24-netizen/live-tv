    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b; 
        }
        ::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b; 
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .channel-item {
            transition: all 0.2s ease-in-out;
        }
        .channel-item:hover {
            transform: translateX(4px);
            background: rgba(56, 189, 248, 0.1);
            border-color: rgba(56, 189, 248, 0.3);
        }
        .channel-item.active {
            background: rgba(56, 189, 248, 0.2);
            border-left: 4px solid #38bdf8;
        }

        #videoContainer {
            aspect-ratio: 16 / 9;
            background-color: #000;
            position: relative;
        }
        
        .loader {
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: #38bdf8;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

                    <div class="loader"></div>
                </div>
                <div id="playerError" class="absolute inset-0 flex flex-col items-center justify-center bg-black/90 z-20 hidden text-center p-4">
                    <i class="fa-solid fa-triangle-exclamation text-red-500 text-4xl mb-2"></i>
                    <p class="text-red-400 font-medium">Stream Unavailable or Offline</p>
                    <p class="text-xs text-slate-400 mt-2">Try another channel</p>
                </div>
                
                <!-- Initial State -->
                <div id="playerInitial" class="absolute inset-0 flex flex-col items-center justify-center z-10 text-slate-500">
                    <i class="fa-solid fa-play-circle text-6xl mb-4 opacity-50"></i>
                    <p class="text-lg font-medium">Select a channel to start watching</p>
                </div>

                <video id="video" class="w-full h-full object-contain absolute inset-0 z-0 hidden" controls playsinline></video>
                
                <!-- Now Playing Bar -->
                <div class="absolute top-0 left-0 right-0 p-4 bg-gradient-to-b from-black/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none z-10">
                    <h2 id="nowPlayingTitle" class="text-white text-lg font-bold shadow-sm">Not Playing</h2>
                </div>
            </div>
            
            <!-- Mobile Info Bar (Visible under video on mobile) -->
            <div class="lg:hidden p-3 bg-slate-800 border-b border-slate-700 flex justify-between items-center shadow-md">
                <span id="mobileNowPlaying" class="font-semibold text-sky-400 truncate pr-2">Choose Channel</span>
                <span class="text-xs text-slate-400 whitespace-nowrap bg-slate-900 px-2 py-1 rounded-md border border-slate-700"><span id="mobileTotalChannels">0</span> Chs</span>
            </div>
        </section>

        <!-- Sidebar / Channel List -->
        <section class="w-full lg:w-1/3 xl:w-1/4 flex flex-col bg-slate-900 lg:border-l border-slate-800 relative z-0 flex-1 overflow-hidden">
            
            <!-- Search Bar -->
            <div class="p-4 border-b border-slate-800 glass-panel sticky top-0 z-10">
                <div class="relative">
                    <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="searchInput" placeholder="Search channels..."

                </div>
                <div class="flex justify-between items-center mt-3 text-xs text-slate-400 font-medium px-1">
                    <span>Available Channels</span>
                    <span class="bg-slate-800 px-2 py-0.5 rounded border border-slate-700 text-sky-400" id="desktopTotalChannels">0</span>
                </div>
            </div>

            <!-- Channel List Container -->
            <ul id="channelList" class="flex-1 overflow-y-auto p-2 pb-20 lg:pb-2 space-y-1">
                <!-- Channels will be injected here via JS -->
            </ul>
        </section>
    </main>

        // DOM Elements
        const channelListEl = document.getElementById('channelList');
        const searchInput = document.getElementById('searchInput');
        const video = document.getElementById('video');
        const playerInitial = document.getElementById('playerInitial');
        const playerLoading = document.getElementById('playerLoading');
        const playerError = document.getElementById('playerError');
        const nowPlayingTitle = document.getElementById('nowPlayingTitle');
        const mobileNowPlaying = document.getElementById('mobileNowPlaying');
        
        let hlsInstance = null;
        let activeChannelItem = null;

        function playChannel(url, name, listItem) {
            // Update UI
            playerInitial.classList.add('hidden');
            playerError.classList.add('hidden');
            playerLoading.classList.remove('hidden');
            video.classList.remove('hidden');
            
            nowPlayingTitle.textContent = name;
            mobileNowPlaying.textContent = name;

            // Highlight active channel in list
            if (activeChannelItem) {
                activeChannelItem.classList.remove('active');
            }
            if(listItem) {
                listItem.classList.add('active');
                activeChannelItem = listItem;
            }

            // Cleanup previous HLS instance
            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }

            const isMp4OrMkv = url.toLowerCase().endsWith('.mp4') || url.toLowerCase().endsWith('.mkv');

            if (isMp4OrMkv) {
                // Direct play for standard video files
                video.src = url;
                video.play().catch(e => handleError(e));
                playerLoading.classList.add('hidden');
            } else if (Hls.isSupported()) {
                // HLS playback for .m3u8
                hlsInstance = new Hls({
                    debug: false,
                    enableWorker: true
                });
                
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(video);
                
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                    playerLoading.classList.add('hidden');
                    video.play().catch(e => console.log("Autoplay blocked:", e));
                });
                
                hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                console.error("Fatal network error encountered, try to recover");
                                hlsInstance.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                console.error("Fatal media error encountered, try to recover");
                                hlsInstance.recoverMediaError();
                                break;
                            default:
                                handleError(data);
                                hlsInstance.destroy();
                                break;
                        }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Native HLS (Safari)
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    playerLoading.classList.add('hidden');
                    video.play();
                });
                video.addEventListener('error', handleError);
            } else {
                alert("Your browser does not support HLS playback.");
            }
        }

        function handleError(err) {
            console.error("Playback error:", err);
            playerLoading.classList.add('hidden');
            playerError.classList.remove('hidden');
            video.classList.add('hidden');
        }

        // Render Channels
        function renderChannels(channels) {
            channelListEl.innerHTML = '';
            
            if(channels.length === 0) {
                channelListEl.innerHTML = '<li class="p-4 text-center text-slate-500">No channels found</li>';
                return;
            }

            channels.forEach((channel) => {
                // Skip empty names or invalid URLs (cleaning up the data a bit)
                if(!channel.name || !channel.name.trim()) return;

                const li = document.createElement('li');
                li.className = 'channel-item cursor-pointer flex items-center justify-between p-3 rounded-lg border border-transparent border-b-slate-800 lg:border-b-transparent lg:hover:border-slate-700';
                
                li.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div class="w-8 h-8 rounded bg-slate-800 flex items-center justify-center text-sky-400 flex-shrink-0 border border-slate-700 shadow-inner">
                            <i class="fa-solid fa-play text-xs"></i>
                        </div>
                        <span class="font-medium text-slate-200 truncate whitespace-nowrap">${channel.name}</span>
                    </div>
                `;

                li.addEventListener('click', () => {
                    playChannel(channel.url, channel.name, li);
                    // On mobile, optionally scroll up to player
                    if(window.innerWidth < 1024) {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                });
                
                channelListEl.appendChild(li);
            });
        }

        // Initialize Search
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = playlistData.channels.filter(ch => 
                ch.name && ch.name.toLowerCase().includes(term)
            );
            renderChannels(filtered);
        });

        // Initialize Info Modal Data
        function populateInfoModal() {
            const info = playlistData.info;
            document.getElementById('headerVersion').textContent = info.version || 'Beta';
            document.getElementById('desktopTotalChannels').textContent = playlistData.channels.length;
            document.getElementById('mobileTotalChannels').textContent = playlistData.channels.length;

            const infoHtml = `
                <div class="grid grid-cols-2 gap-2 border-b border-slate-700 pb-2">
                    <div class="text-slate-400">Owner</div>
                    <div class="font-semibold text-white text-right">${info.owner}</div>
                    
                    <div class="text-slate-400">Team</div>
                    <div class="font-semibold text-sky-400 text-right">${info.Team}</div>
                    
                    <div class="text-slate-400">Version</div>
                    <div class="font-medium text-white text-right">${info.version}</div>
                </div>
                <div class="pt-2 text-xs text-slate-400 text-justify leading-relaxed">
                    <strong class="text-slate-300">Note:</strong> ${info.note}
                </div>
                <div class="pt-2 text-xs text-red-400/80 text-center border-t border-slate-800 mt-2">
                    ${info.disclaimer}
                </div>
            `;
            document.getElementById('infoContentArea').innerHTML = infoHtml;
        }

        // Modal Toggle Logic
        const modal = document.getElementById('infoModal');
        const modalContent = document.getElementById('infoModalContent');
        
        function toggleInfoModal() {
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                // Small delay for transition to work
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    modalContent.classList.remove('scale-95');
                }, 10);
            } else {
                modal.classList.add('opacity-0');
                modalContent.classList.add('scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300); // match transition duration
            }
        }

        // Close modal on outside click
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                toggleInfoModal();
            }
        });

        // App Initialization
        window.addEventListener('DOMContentLoaded', () => {
            populateInfoModal();
            renderChannels(playlistData.channels);
        });

    </script>
