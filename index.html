        window.onload = function() {
            document.getElementById('total-channels-badge').textContent = `${dataSet.channels.length}টি চ্যানেল`;

            // পিসির জন্য fluid: false এবং fill: true ব্যবহার করা হয়েছে যেন কন্টেইনার ফিলাপ করে
            player = videojs('my-video', {
                fluid: false, 
                fill: true,
                responsive: true,
                playbackRates: [0.5, 1, 1.25, 1.5, 2],
                userActions: {
                    hotkeys: true // পিসিতে কীবোর্ড শর্টকাট (Space, M, F) এনাবল করা
                },
                controlBar: { skipButtons: { forward: 10, backward: 10 } }
            });

            player.hlsQualitySelector({ displayCurrentQuality: true });

            player.on('loadstart', () => updatePlayerStatus('loading'));
            player.on('waiting', () => updatePlayerStatus('buffering'));
            player.on('playing', () => updatePlayerStatus('playing'));
            player.on('pause', () => updatePlayerStatus('idle'));
            
            player.on('error', function() {
                updatePlayerStatus('error');
                const errorDisplay = document.querySelector('.vjs-error-display');
                if (errorDisplay) {
                    errorDisplay.innerHTML = `
                        <div class="p-6 text-center">
                            <i class="fa-solid fa-circle-exclamation text-red-500 text-3xl mb-2"></i>
                            <p class="font-bold text-white text-sm">চ্যানেলটি লোড হতে ব্যর্থ হয়েছে</p>
                            <p class="text-[10px] text-slate-400 mt-2">চ্যানেলটি অফলাইনে থাকতে পারে বা ব্রাউজারের সিকিউরিটি ব্লক করেছে।</p>
                        </div>
                    `;
                }
            });

            player.on('fullscreenchange', function() {
                if (player.isFullscreen()) {
                    if (screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock('landscape').catch(err => console.log('Lock error:', err));
                    }
                    videoEl = document.querySelector('#my-video_html5_api');
                    resetZoom();
                    setupPinchToZoom();
                } else {
                    if (screen.orientation && screen.orientation.unlock) {
                        screen.orientation.unlock();
                    }
                    resetZoom();
                }
            });

            // ইভেন্ট লিসেনার সেটআপ 
            document.getElementById('search-input').addEventListener('input', function(e) {
                searchQuery = e.target.value.toLowerCase().trim();
                renderChannels();
            });

            const pills = document.querySelectorAll('.category-pill');
            pills.forEach(pill => {
                pill.addEventListener('click', function() {
                    pills.forEach(p => {
                        p.classList.remove('bg-blue-600', 'text-white', 'shadow-md', 'shadow-blue-500/20');
                        p.classList.add('bg-slate-800', 'text-slate-400');
                    });
                    this.classList.add('bg-blue-600', 'text-white', 'shadow-md', 'shadow-blue-500/20');
                    this.classList.remove('bg-slate-800', 'text-slate-400');
                    
                    activeCategory = this.getAttribute('data-category');
                    renderChannels();
                });
            });

            renderChannels();
            if (dataSet.channels.length > 0) {
                playChannel(dataSet.channels[0].url, false);
            }
        };

        function setupPinchToZoom() {
            const playerContainer = document.getElementById('my-video');
            if (!playerContainer) return;

            playerContainer.addEventListener('touchstart', function(e) {
                if (!player.isFullscreen()) return; 

                if (e.touches.length === 2) {
                    isMultiTouch = true;
                    startX = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                    lastScale = scale;
                } else if (e.touches.length === 1 && scale > 1) {
                    isMultiTouch = false;
                    startX = e.touches[0].pageX - lastPosX;
                    startY = e.touches[0].pageY - lastPosY;
                }
            }, { passive: true });

            playerContainer.addEventListener('touchmove', function(e) {
                if (!player.isFullscreen() || !videoEl) return;

                if (e.touches.length === 2 && isMultiTouch) {
                    const currentDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                    scale = Math.min(Math.max(1, (currentDist / startX) * lastScale), 4);
                    updateVideoTransform();
                } else if (e.touches.length === 1 && !isMultiTouch && scale > 1) {
                    posX = e.touches[0].pageX - startX;
                    posY = e.touches[0].pageY - startY;
                    updateVideoTransform();
                }
            }, { passive: true });

            playerContainer.addEventListener('touchend', function(e) {
                if (e.touches.length < 2) isMultiTouch = false;
                lastPosX = posX; lastPosY = posY; lastScale = scale;
            }, { passive: true });
        }

        function updateVideoTransform() {
            if (videoEl) videoEl.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        }

        function resetZoom() {
            scale = 1; lastScale = 1;
            startX = 0; startY = 0; posX = 0; posY = 0; lastPosX = 0; lastPosY = 0;
            if (videoEl) videoEl.style.transform = 'translate(0px, 0px) scale(1)';
        }

        function updatePlayerStatus(state) {
            currentPlayState = state;
            const statusBadge = document.getElementById('list-status-badge');
            const statusDot = document.getElementById('list-status-dot');
            const statusText = document.getElementById('list-status-text');

            if (!statusBadge) return;

            if (state === 'loading') {
                statusDot.className = 'w-1.5 h-1.5 rounded-full bg-yellow-500 animate-pulse shadow-[0_0_5px_rgba(234,179,8,0.8)]';
                statusText.textContent = 'লোড হচ্ছে...';
                statusText.className = 'text-[10px] font-bold text-yellow-400 tracking-widest';
            } else if (state === 'buffering') {
                statusDot.className = 'w-1.5 h-1.5 rounded-full bg-orange-500 animate-pulse shadow-[0_0_5px_rgba(249,115,22,0.8)]';
                statusText.textContent = 'বাফারিং...';
                statusText.className = 'text-[10px] font-bold text-orange-400 tracking-widest';
            } else if (state === 'playing') {
                statusDot.className = 'w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse shadow-[0_0_5px_rgba(34,197,94,0.8)]';
                statusText.textContent = 'চলছে';
                statusText.className = 'text-[10px] font-bold text-green-400 tracking-widest';
            } else if (state === 'error') {
                statusDot.className = 'w-1.5 h-1.5 rounded-full bg-red-500 shadow-[0_0_5px_rgba(239,68,68,0.8)]';
                statusText.textContent = 'এরর/অফলাইন';
                statusText.className = 'text-[10px] font-bold text-red-400 tracking-widest';
            } else if (state === 'idle') {
                statusDot.className = 'w-1.5 h-1.5 rounded-full bg-blue-500 shadow-[0_0_5px_rgba(59,130,246,0.8)]';
                statusText.textContent = 'রেডি';
                statusText.className = 'text-[10px] font-bold text-blue-400 tracking-widest';
            }
        }

        function renderChannels() {
            const container = document.getElementById('channels-container');
            container.innerHTML = '';

            let filtered = dataSet.channels.filter(ch => {
                if (!ch.name) return false;
                const matchesSearch = ch.name.toLowerCase().includes(searchQuery);
                const chCat = getChannelCategory(ch);
                const matchesCategory = (activeCategory === 'all' || chCat === activeCategory);
                return matchesSearch && matchesCategory;
            });

            document.getElementById('showing-count').textContent = `${filtered.length}টি`;

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="p-10 text-center text-slate-500 text-sm mt-10">
                        <i class="fa-solid fa-folder-open text-4xl mb-3 text-slate-600"></i><br>
                        কোনো চ্যানেল খুঁজে পাওয়া যায়নি!
                    </div>
                `;
                return;
            }

            filtered.forEach(ch => {
                const isActive = (ch.url === currentActiveUrl);
                const logoInfo = getChannelLogoStyles(ch.name);
                const isMp4 = ch.url.endsWith('.mp4') || ch.url.endsWith('.mkv');
                
                const card = document.createElement('div');
                // পিসির জন্য হোভার ইফেক্টস (hover:-translate-y-0.5) যুক্ত করা হয়েছে
                card.className = `p-3 rounded-xl flex items-center justify-between cursor-pointer transition-all duration-300 group ${
                    isActive 
                    ? 'bg-blue-600/20 border border-blue-500/50 shadow-[0_0_15px_rgba(59,130,246,0.15)]' 
                    : 'bg-slate-900 border border-slate-800 hover:bg-slate-800/80 hover:border-slate-600 hover:-translate-y-0.5 hover:shadow-lg'
                }`;
                
                let rightSideContent = '';
                if (isActive) {
                    rightSideContent = `
                        <div id="list-status-badge" class="flex items-center gap-1.5 px-2 py-1 rounded-md bg-slate-950/50 border border-blue-500/30 shadow-sm">
                            <span id="list-status-dot" class="w-1.5 h-1.5 rounded-full bg-yellow-500 animate-pulse"></span>
                            <span id="list-status-text" class="text-[10px] font-bold text-yellow-400 tracking-widest">লোড...</span>
                        </div>
                    `;
                } else {
                    rightSideContent = `<i class="fa-solid fa-play text-slate-600 text-xs group-hover:text-blue-400 mr-1 transition-colors group-hover:scale-110"></i>`;
                }

                card.innerHTML = `
                    <div class="flex items-center gap-3.5 min-w-0 flex-grow" onclick="playChannel('${ch.url}', true)">
                        <div class="w-11 h-11 rounded-xl flex-shrink-0 flex items-center justify-center font-black text-sm text-white shadow-md bg-gradient-to-tr ${logoInfo.gradient}">
                            ${logoInfo.text}
                        </div>
                        <div class="min-w-0">
                            <h4 class="text-sm font-bold truncate ${isActive ? 'text-blue-400' : 'text-slate-200 group-hover:text-white'}">${ch.name}</h4>
                            <p class="text-[10.5px] font-medium text-slate-500 truncate mt-0.5 flex items-center gap-1.5">
                                ${isMp4 ? '<i class="fa-solid fa-clapperboard text-indigo-400"></i> ভিডিও ফাইল' : '<i class="fa-solid fa-tower-broadcast text-emerald-400"></i> লাইভ স্ট্রিম'}
                            </p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        ${rightSideContent}
                    </div>
                `;
                container.appendChild(card);
            });

            updatePlayerStatus(currentPlayState);
        }

        function playChannel(url, isAutoPlay = true) {
            currentActiveUrl = url;
            currentPlayState = isAutoPlay ? 'loading' : 'idle'; 
            
            resetZoom();
            renderChannels(); 

            let streamType = 'application/x-mpegURL'; 
            if (url.endsWith('.mp4')) streamType = 'video/mp4';
            else if (url.endsWith('.mkv')) streamType = 'video/webm';
            else if (url.endsWith('.mp3')) streamType = 'audio/mpeg';

            try {
                player.src({ src: url, type: streamType });
                
                if (isAutoPlay) {
                    const playPromise = player.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(error => {
                            console.warn("অটোপ্লে পলিসির কারণে ভিডিও প্লে ব্লক করা হয়েছে:", error);
                            updatePlayerStatus('idle');
                        });
                    }
                }
            } catch (error) {
                console.error("ভিডিও স্ট্রিম লোড করতে ব্যর্থ হয়েছে:", error);
                updatePlayerStatus('error');
            }
        }
    </script>
</body>
</html>
