<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIVE IP TV PRO - লাইভ টিভি প্লেয়ার</title>
    
    <!-- Tailwind CSS UI স্টাইলিংয়ের জন্য -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Video.js লাইব্রেরি m3u8/HLS স্ট্রিম চালানোর জন্য -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video-js.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/video.js/8.10.0/video.min.js"></script>
    
    <!-- ভিডিও কোয়ালিটি ম্যানুয়ালি সিলেক্ট করার প্লাগইনসমূহ -->
    <script src="https://unpkg.com/videojs-contrib-quality-levels@4.1.0/dist/videojs-contrib-quality-levels.min.js"></script>
    <script src="https://unpkg.com/videojs-hls-quality-selector@2.0.0/dist/videojs-hls-quality-selector.min.js"></script>

    <!-- ফন্টঅসাম আইকন লাইব্রেরি -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <style>
        /* কাস্টম স্ক্রলবার - পিসি এবং লিস্টের জন্য */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0f172a;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #3b82f6;
        }
        
        /* লুকানো স্ক্রলবার (হরাইজন্টাল স্ক্রলের জন্য) */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* ভিডিওপ্লেয়ার স্টাইলিং */
        .video-js {
            width: 100% !important;
            height: 100% !important;
            background-color: #000;
            overflow: hidden;
            font-family: inherit;
        }

        /* Pinch to Zoom এর জন্য আসল ভিডিও এলিমেন্টকে টার্গেট করা */
        .video-js video {
            transform-origin: center center;
            transition: transform 0.05s ease-out;
            will-change: transform;
            object-fit: contain;
        }

        /* প্লে বাটনের আকর্ষণীয় ডিজাইন */
        .vjs-big-play-button {
            background-color: rgba(59, 130, 246, 0.85) !important;
            border: none !important;
            border-radius: 50% !important;
            width: 3em !important;
            height: 3em !important;
            line-height: 3em !important;
            margin-top: -1.5em !important;
            margin-left: -1.5em !important;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }
        .video-js:hover .vjs-big-play-button {
            background-color: #2563eb !important;
            transform: scale(1.1);
        }

        /* কন্ট্রোল বার ডিজাইন */
        .vjs-control-bar {
            background: linear-gradient(to top, rgba(15, 23, 42, 0.95), rgba(15, 23, 42, 0.5), transparent) !important;
            z-index: 10;
            height: 3.5em !important;
        }

        /* পিসিতে কোয়ালিটি সিলেক্টর মেনু সুন্দর ও দৃশ্যমান করার জন্য কাস্টম CSS */
        .vjs-menu-button-popup .vjs-menu-content {
            background-color: rgba(15, 23, 42, 0.95) !important;
            border-radius: 8px;
            border: 1px solid rgba(51, 65, 85, 0.5);
            padding: 5px 0 !important;
            bottom: 1.5em !important; /* কন্ট্রোলবারের উপরে উঠানোর জন্য */
        }
        .vjs-menu li.vjs-menu-item {
            color: #cbd5e1 !important;
            font-family: ui-sans-serif, system-ui, sans-serif !important;
            font-size: 1.1em;
            text-transform: capitalize;
            padding: 0.5em 1.5em;
            transition: all 0.2s;
        }
        .vjs-menu li.vjs-menu-item:hover,
        .vjs-menu li.vjs-menu-item:focus {
            background-color: rgba(59, 130, 246, 0.2) !important;
            color: #60a5fa !important;
        }
        .vjs-menu li.vjs-selected {
            background-color: #2563eb !important;
            color: #ffffff !important;
            font-weight: bold;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 h-screen w-full font-sans select-none overflow-hidden flex flex-col lg:flex-row">

    <!-- বাম পাশ (পিসি) / উপরের অংশ (মোবাইল): ভিডিও প্লেয়ার এরিয়া -->
    <section class="flex flex-col w-full lg:flex-1 h-auto lg:h-full relative z-20 bg-slate-950 border-b lg:border-b-0 lg:border-r border-slate-800 shadow-2xl lg:shadow-none">
        
        <!-- হেডার -->
        <header class="px-4 py-3 flex justify-between items-center w-full bg-slate-950/80 backdrop-blur-md z-30">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-circle-play text-xl text-blue-500 animate-pulse drop-shadow-[0_0_8px_rgba(59,130,246,0.5)]"></i>
                <h1 class="text-lg lg:text-xl font-black tracking-wide text-white flex items-baseline gap-1.5">
                    LIVE IP TV PRO 
                    <span class="text-[10px] lg:text-xs text-slate-400 font-medium hidden sm:inline-block">By Shahadot Hossain</span>
                </h1>
            </div>
            <!-- কুইক স্ট্যাটাস -->
            <div class="text-[10px] lg:text-xs text-slate-300 font-semibold flex items-center gap-1.5 bg-slate-900/80 px-2.5 py-1.5 rounded-lg border border-slate-700/50 shadow-sm">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-ping"></span>
                <span id="total-channels-badge">লোড হচ্ছে...</span>
            </div>
        </header>

        <!-- ভিডিও প্লেয়ার বক্স -->
        <div class="w-full aspect-video lg:aspect-auto lg:flex-1 bg-black relative flex items-center justify-center group" id="player-container">
            <video id="my-video" class="video-js vjs-default-skin vjs-big-play-centered w-full h-full lg:absolute lg:inset-0" controls playsinline preload="auto" poster="https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=1200&auto=format&fit=crop">
                <p class="vjs-no-js">
                    ভিডিওটি দেখার জন্য ব্রাউজারে জাভাস্ক্রিপ্ট এবং HTML5 ভিডিও সাপোর্ট থাকা প্রয়োজন।
                </p>

        <!-- পিসির জন্য ফুটার -->
        <footer class="hidden lg:block bg-slate-950/90 py-4 text-center text-xs text-slate-500 border-t border-slate-800">
            <p>© ২০২৬ <span class="font-bold text-slate-400">IPTV HEXA PRO</span>. All rights reserved. <span class="mx-2">|</span> Developer: Shahadot Hossain <span class="mx-2">|</span> Version: v7.0 (API Based)</p>
        </footer>
    </section>

    <!-- ডান পাশ (পিসি) / নিচের অংশ (মোবাইল): চ্যানেল লিস্ট ও সার্চ এরিয়া -->
    <section class="flex flex-col w-full lg:w-[400px] xl:w-[450px] flex-1 lg:flex-none h-full bg-slate-950 z-10 overflow-hidden">
        
        <!-- সার্চ এবং ফিল্টার ব্লক (স্থির থাকবে) -->
        <div class="p-3 sm:p-4 shrink-0 bg-slate-950 border-b border-slate-800 shadow-sm z-10 flex flex-col gap-3">
            <div class="relative group">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
                <input type="text" id="search-input" placeholder="টিভি চ্যানেলের নাম খুঁজুন..." class="w-full bg-slate-900 border border-slate-700/80 focus:border-blue-500 rounded-xl pl-11 pr-4 py-3 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20 transition-all shadow-inner">
            </div>

            <!-- ক্যাটাগরি বাটনসমূহ -->
            <div class="flex overflow-x-auto hide-scrollbar gap-2 pb-1 lg:flex-wrap lg:overflow-visible" id="category-pills">
                <button class="category-pill whitespace-nowrap px-3 py-1.5 rounded-lg text-xs font-semibold bg-blue-600 text-white transition-all shadow-md shadow-blue-500/20 cursor-pointer" data-category="all">সব চ্যানেল</button>
                <button class="category-pill whitespace-nowrap px-3 py-1.5 rounded-lg text-xs font-semibold bg-slate-800 text-slate-400 hover:text-slate-200 hover:bg-slate-700 transition-all cursor-pointer" data-category="sports">খেলাধুলা</button>
                <button class="category-pill whitespace-nowrap px-3 py-1.5 rounded-lg text-xs font-semibold bg-slate-800 text-slate-400 hover:text-slate-200 hover:bg-slate-700 transition-all cursor-pointer" data-category="news">খবর</button>
                <button class="category-pill whitespace-nowrap px-3 py-1.5 rounded-lg text-xs font-semibold bg-slate-800 text-slate-400 hover:text-slate-200 hover:bg-slate-700 transition-all cursor-pointer" data-category="entertainment">বিনোদন</button>
                <button class="category-pill whitespace-nowrap px-3 py-1.5 rounded-lg text-xs font-semibold bg-slate-800 text-slate-400 hover:text-slate-200 hover:bg-slate-700 transition-all cursor-pointer" data-category="islamic">ইসলামিক</button>
                <button class="category-pill whitespace-nowrap px-3 py-1.5 rounded-lg text-xs font-semibold bg-slate-800 text-slate-400 hover:text-slate-200 hover:bg-slate-700 transition-all cursor-pointer" data-category="kids">কার্টুন</button>
            </div>

            <div class="flex items-center justify-between mt-1 px-1">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-wider flex items-center gap-1.5">
                    <i class="fa-solid fa-list text-blue-500"></i> প্লেলিস্ট (<span id="showing-count">০</span>)
                </span>
            </div>
        </div>

        <!-- চ্যানেল লিস্ট এরিয়া (শুধুমাত্র এই অংশটি স্ক্রল হবে) -->
        <div id="channels-container" class="flex-1 overflow-y-auto p-3 sm:p-4 pt-2 flex flex-col gap-2.5 custom-scrollbar bg-slate-900/30">
            <!-- ডিফল্ট লোডিং স্ক্রিন -->
            <div class="p-8 text-center text-slate-500 text-sm mt-10">
                <i class="fa-solid fa-cloud-arrow-down fa-bounce text-blue-500 text-3xl mb-3"></i><br>
                সার্ভার থেকে চ্যানেল লোড হচ্ছে...
            </div>
        </div>

        <!-- মোবাইলের জন্য ফুটার -->
        <footer class="lg:hidden bg-slate-950 border-t border-slate-800 py-4 shrink-0 text-center text-[10px] text-slate-500">
            <p>© ২০২৬ <span class="font-bold text-slate-400">IPTV HEXA PRO</span>. All rights reserved.<br>Developer: Shahadot Hossain</p>
        </footer>
    </section>

    <script>
        // ডায়নামিক ডেটাবেস ভেরিয়েবল
        let dataSet = { info: {}, channels: [] };
        
        // গিটহাবের RAW ফাইলের লিংক
        const JSON_DATA_URL = 'Channels_data.json'; 

        let player;
        let activeCategory = 'all';
        let searchQuery = '';
        let currentActiveUrl = '';
        let currentPlayState = 'idle';

        // Pinch to zoom variables
        let videoEl = null;
        let scale = 1, lastScale = 1;
        let startX = 0, startY = 0;
        let posX = 0, posY = 0, lastPosX = 0, lastPosY = 0;
        let isMultiTouch = false;

        function getChannelLogoStyles(name) {
            const hash = name.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
            const gradients = [
                'from-blue-600 to-indigo-600',
                'from-emerald-500 to-teal-600',
                'from-rose-500 to-orange-600',
                'from-purple-600 to-pink-600',
                'from-amber-500 to-red-600'
            ];
            const selectedGradient = gradients[hash % gradients.length];
            const initials = name.split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
            return { gradient: selectedGradient, text: initials.slice(0, 2) };
        }

        function getChannelCategory(channel) {
            const name = channel.name.toLowerCase();
            if (name.includes('sport') || name.includes('tnt') || name.includes('bein') || name.includes('willow') || name.includes('aspor') || name.includes('sports')) return 'sports';
            if (name.includes('news') || name.includes('somoy') || name.includes('ekattor') || name.includes('independent') || name.includes('jamuna') || name.includes('ekhbaria') || name.includes('dw') || name.includes('france 24') || name.includes('cnn') || name.includes('ndtv') || name.includes('rt news') || name.includes('press tv') || name.includes('kolkata tv')) return 'news';
            if (name.includes('quran') || name.includes('sunnah') || name.includes('madani') || name.includes('waz') || name.includes('alqamar') || name.includes('istiqama') || name.includes('islam')) return 'islamic';
            if (name.includes('kids') || name.includes('cartoon') || name.includes('cbeebies') || name.includes('doraemon') || name.includes('gopal') || name.includes('motu') || name.includes('junior') || name.includes('smart')) return 'kids';
            return 'entertainment'; 
        }

        window.onload = function() {
            // VideoJS ইনিশিয়ালাইজেশন
            player = videojs('my-video', {
                fluid: false, 
                fill: true,
                responsive: true,
                playbackRates: [0.5, 1, 1.25, 1.5, 2],
                userActions: {
                    hotkeys: true 
                },
                controlBar: { skipButtons: { forward: 10, backward: 10 } }
            });

            player.hlsQualitySelector({ displayCurrentQuality: true });

            // ফুলস্ক্রিন অটো-রোটেট ল্যান্ডস্কেপ মোড (মোবাইলের জন্য)
            player.on('fullscreenchange', function() {
                if (player.isFullscreen()) {
                    if (screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock('landscape').catch(function(error) {
                            console.warn("অটো-রোটেট সাপোর্ট করছে না:", error);
                        });
                    }
                } else {
                    if (screen.orientation && screen.orientation.unlock) {
                        screen.orientation.unlock();
                    }
                    resetZoom();
                }
            });

            player.on('loadstart', () => updatePlayerStatus('loading'));
            player.on('waiting', () => updatePlayerStatus('buffering'));
            player.on('playing', () => updatePlayerStatus('playing'));
            player.on('pause', () => updatePlayerStatus('idle'));
            
            player.on('error', function() {
                updatePlayerStatus('error');
                const errorDisplay = document.querySelector('.vjs-error-display');
                if (errorDisplay) {
                    errorDisplay.innerHTML = `
                        <div class="p-6 text-center">
                            <i class="fa-solid fa-circle-exclamation text-red-500 text-3xl mb-2"></i>
                            <p class="font-bold text-white text-sm">চ্যানেলটি লোড হতে ব্যর্থ হয়েছে</p>
                        </div>
                    `;
                }
            });

            // জুমের জন্য ভিডিও এলিমেন্ট নির্ধারণ এবং ইভেন্ট সেটআপ
            videoEl = player.el().querySelector('video');
            setupPinchToZoom();

            // ইভেন্ট লিসেনার সেটআপ 
            document.getElementById('search-input').addEventListener('input', function(e) {
                searchQuery = e.target.value.toLowerCase().trim();
                renderChannels();
            });

            const pills = document.querySelectorAll('.category-pill');
            pills.forEach(pill => {
                pill.addEventListener('click', function() {
                    pills.forEach(p => {
                        p.classList.remove('bg-blue-600', 'text-white', 'shadow-md', 'shadow-blue-500/20');
                        p.classList.add('bg-slate-800', 'text-slate-400');
                    });
                    this.classList.add('bg-blue-600', 'text-white', 'shadow-md', 'shadow-blue-500/20');
                    this.classList.remove('bg-slate-800', 'text-slate-400');
                    
                    activeCategory = this.getAttribute('data-category');
                    renderChannels();
                });
            });

            fetchChannelData();
        };

        // JSON ফাইল থেকে ডেটা নিয়ে আসার ফাংশন
        async function fetchChannelData() {
            const container = document.getElementById('channels-container');
            container.innerHTML = `
                <div class="p-8 text-center text-slate-500 text-sm">
                    <i class="fa-solid fa-spinner fa-spin text-blue-500 text-3xl mb-3"></i><br>
                    চ্যানেল লিস্ট লোড হচ্ছে...
                </div>
            `;

            try {
                const response = await fetch(JSON_DATA_URL);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                dataSet = await response.json();
                document.getElementById('total-channels-badge').textContent = `${dataSet.channels.length}টি চ্যানেল`;
                renderChannels();
                
                if (dataSet.channels.length > 0) {
                    playChannel(dataSet.channels[0].url, false);
                }
            } catch (error) {
                console.error("Data fetch error:", error);
                container.innerHTML = `
                    <div class="p-8 text-center text-red-500 text-sm">
                        <i class="fa-solid fa-triangle-exclamation text-4xl mb-3"></i><br>
                        চ্যানেল লিস্ট লোড করতে ব্যর্থ!<br>
                        <button onclick="fetchChannelData()" class="mt-4 px-4 py-2 bg-blue-600 text-white rounded-lg text-xs font-bold hover:bg-blue-700">পুনরায় চেষ্টা করুন</button>
                    </div>
                `;
            }
        }

        function setupPinchToZoom() {
            // Video.js এর মেইন কন্টেইনার
            const playerContainer = player.el();
            if (!playerContainer) return;

            playerContainer.addEventListener('touchstart', function(e) {
                if (!player.isFullscreen()) return; 

                if (e.touches.length === 2) {
                    isMultiTouch = true;
                    startX = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                    lastScale = scale;
                } else if (e.touches.length === 1 && scale > 1) {
                    isMultiTouch = false;
                    startX = e.touches[0].pageX - lastPosX;
                    startY = e.touches[0].pageY - lastPosY;
                }
            }, { passive: true });

            playerContainer.addEventListener('touchmove', function(e) {
                if (!player.isFullscreen() || !videoEl) return;

                if (e.touches.length === 2 && isMultiTouch) {
                    const currentDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                    scale = Math.min(Math.max(1, (currentDist / startX) * lastScale), 4); // Max 4x Zoom
                    updateVideoTransform();
                } else if (e.touches.length === 1 && !isMultiTouch && scale > 1) {
                    posX = e.touches[0].pageX - startX;
                    posY = e.touches[0].pageY - startY;
                    updateVideoTransform();
                }
            }, { passive: true });

            playerContainer.addEventListener('touchend', function(e) {
                if (e.touches.length < 2) isMultiTouch = false;
                lastPosX = posX; lastPosY = posY; lastScale = scale;
            }, { passive: true });
        }

        function updateVideoTransform() {
            if (videoEl) {
                videoEl.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
            }
        }

        function resetZoom() {
            scale = 1; lastScale = 1;
            startX = 0; startY = 0; posX = 0; posY = 0; lastPosX = 0; lastPosY = 0;
            if (videoEl) videoEl.style.transform = 'translate(0px, 0px) scale(1)';
        }

        function updatePlayerStatus(state) {
            currentPlayState = state;
            const statusBadge = document.getElementById('list-status-badge');
            const statusDot = document.getElementById('list-status-dot');
            const statusText = document.getElementById('list-status-text');

            if (!statusBadge) return;

            if (state === 'loading') {
                statusDot.className = 'w-1.5 h-1.5 rounded-full bg-yellow-500 animate-pulse shadow-[0_0_5px_rgba(234,179,8,0.8)]';
                statusText.textContent = 'লোড হচ্ছে...';
                statusText.className = 'text-[10px] font-bold text-yellow-400 tracking-widest';
            } else if (state === 'buffering') {
                statusDot.className = 'w-1.5 h-1.5 rounded-full bg-orange-500 animate-pulse shadow-[0_0_5px_rgba(249,115,22,0.8)]';
                statusText.textContent = 'বাফারিং...';
                statusText.className = 'text-[10px] font-bold text-orange-400 tracking-widest';
            } else if (state === 'playing') {
                statusDot.className = 'w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse shadow-[0_0_5px_rgba(34,197,94,0.8)]';
                statusText.textContent = 'চলছে';
                statusText.className = 'text-[10px] font-bold text-green-400 tracking-widest';
            } else if (state === 'error') {
                statusDot.className = 'w-1.5 h-1.5 rounded-full bg-red-500 shadow-[0_0_5px_rgba(239,68,68,0.8)]';
                statusText.textContent = 'এরর/অফলাইন';
                statusText.className = 'text-[10px] font-bold text-red-400 tracking-widest';
            } else if (state === 'idle') {
                statusDot.className = 'w-1.5 h-1.5 rounded-full bg-blue-500 shadow-[0_0_5px_rgba(59,130,246,0.8)]';
                statusText.textContent = 'রেডি';
                statusText.className = 'text-[10px] font-bold text-blue-400 tracking-widest';
            }
        }

        function renderChannels() {
            const container = document.getElementById('channels-container');
            container.innerHTML = '';

            let filtered = dataSet.channels.filter(ch => {
                if (!ch.name) return false;
                const matchesSearch = ch.name.toLowerCase().includes(searchQuery);
                const chCat = getChannelCategory(ch);
                const matchesCategory = (activeCategory === 'all' || chCat === activeCategory);
                return matchesSearch && matchesCategory;
            });

            document.getElementById('showing-count').textContent = `${filtered.length}টি`;

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="p-10 text-center text-slate-500 text-sm mt-10">
                        <i class="fa-solid fa-folder-open text-4xl mb-3 text-slate-600"></i><br>
                        কোনো চ্যানেল খুঁজে পাওয়া যায়নি!
                    </div>
                `;
                return;
            }

            filtered.forEach(ch => {
                const isActive = (ch.url === currentActiveUrl);
                const logoInfo = getChannelLogoStyles(ch.name);
                const isMp4 = ch.url.endsWith('.mp4') || ch.url.endsWith('.mkv');
                
                const card = document.createElement('div');
                card.className = `p-3 rounded-xl flex items-center justify-between cursor-pointer transition-all duration-300 group ${
                    isActive 
                    ? 'bg-blue-600/20 border border-blue-500/50 shadow-[0_0_15px_rgba(59,130,246,0.15)]' 
                    : 'bg-slate-900 border border-slate-800 hover:bg-slate-800/80 hover:border-slate-600 hover:-translate-y-0.5 hover:shadow-lg'
                }`;
                
                let rightSideContent = '';
                if (isActive) {
                    rightSideContent = `
                        <div id="list-status-badge" class="flex items-center gap-1.5 px-2 py-1 rounded-md bg-slate-950/50 border border-blue-500/30 shadow-sm">
                            <span id="list-status-dot" class="w-1.5 h-1.5 rounded-full bg-yellow-500 animate-pulse"></span>
                            <span id="list-status-text" class="text-[10px] font-bold text-yellow-400 tracking-widest">লোড...</span>
                        </div>
                    `;
                } else {
                    rightSideContent = `<i class="fa-solid fa-play text-slate-600 text-xs group-hover:text-blue-400 mr-1 transition-colors group-hover:scale-110"></i>`;
                }

                card.innerHTML = `
                    <div class="flex items-center gap-3.5 min-w-0 flex-grow" onclick="playChannel('${ch.url}', true)">
                        <div class="w-11 h-11 rounded-xl flex-shrink-0 flex items-center justify-center font-black text-sm text-white shadow-md bg-gradient-to-tr ${logoInfo.gradient}">
                            ${logoInfo.text}
                        </div>
                        <div class="min-w-0">
                            <h4 class="text-sm font-bold truncate ${isActive ? 'text-blue-400' : 'text-slate-200 group-hover:text-white'}">${ch.name}</h4>
                            <p class="text-[10.5px] font-medium text-slate-500 truncate mt-0.5 flex items-center gap-1.5">
                                ${isMp4 ? '<i class="fa-solid fa-clapperboard text-indigo-400"></i> ভিডিও ফাইল' : '<i class="fa-solid fa-tower-broadcast text-emerald-400"></i> লাইভ স্ট্রিম'}
                            </p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2">
                        ${rightSideContent}
                    </div>
                `;
                container.appendChild(card);
            });

            updatePlayerStatus(currentPlayState);
        }

        function playChannel(url, isAutoPlay = true) {
            currentActiveUrl = url;
            currentPlayState = isAutoPlay ? 'loading' : 'idle'; 
            
            resetZoom();
            renderChannels(); 

            let streamType = 'application/x-mpegURL'; 
            if (url.endsWith('.mp4')) streamType = 'video/mp4';
            else if (url.endsWith('.mkv')) streamType = 'video/webm';
            else if (url.endsWith('.mp3')) streamType = 'audio/mpeg';

            try {
                player.src({ src: url, type: streamType });
                
                if (isAutoPlay) {
                    const playPromise = player.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(error => {
                            console.warn("অটোপ্লে পলিসির কারণে ভিডিও প্লে ব্লক করা হয়েছে:", error);
                            updatePlayerStatus('idle');
                        });
                    }
                }
            } catch (error) {
                console.error("ভিডিও স্ট্রিম লোড করতে ব্যর্থ হয়েছে:", error);
                updatePlayerStatus('error');
            }
        }
    </script>
</body>
</html>
